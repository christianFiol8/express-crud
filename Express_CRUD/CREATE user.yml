      value: ""
      type: query
  body:
    type: json
    data: |-
      {
        "email": "carlos@example.com",
        "password": "pass1234",
        "name": "Carlos López",
        "birthdate": "1998-07-15"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
